version: "3.9"

services:
  whatsapp_assistant:
    container_name: catia-assistant
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      FLASK_APP: src/app.py
      PYTHONPATH: /app
    restart: always
    volumes:
      - .:/app
    networks:
      - virtual_assistant_network
    command: flask run --host=0.0.0.0 --port=5000 --debug --reload

networks:
  virtual_assistant_network:
    external: true